services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                user: laravel
                uid: 1000
        image: wfa-scheduler-app
        container_name: wfa-scheduler-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
        networks:
            - wfa-net

    web:
        image: nginx:alpine
        container_name: wfa-scheduler-nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - .:/var/www
            - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
        networks:
            - wfa-net
        depends_on:
            - app

    db:
        image: mariadb:10.11
        container_name: wfa-scheduler-db
        restart: unless-stopped
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-fwa}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
            MYSQL_PASSWORD: ${DB_PASSWORD:-password}
            MYSQL_USER: ${DB_USERNAME:-root}
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        volumes:
            - wfa-dbdata:/var/lib/mysql
        networks:
            - wfa-net
    tunnel:
        image: cloudflare/cloudflared:latest
        container_name: wfa-scheduler-tunnel
        restart: unless-stopped
        command: tunnel --no-autoupdate run
        environment:
            - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
        networks:
            - wfa-net
        depends_on:
            - web

networks:
    wfa-net:
        driver: bridge

volumes:
    wfa-dbdata:
        driver: local
